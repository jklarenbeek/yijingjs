<svg xmlns="http://www.w3.org/2000/svg" viewBox="-105 -105 210 210">
  <defs>
    <!-- Add a subtle drop shadow to make the icon pop on any tab background -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Base Yin (Dark gray, almost black) -->
    <circle cx="0" cy="0" r="100" fill="#111827" />
    
    <!-- Yang (Off-white) -->
    <path d="M 0 -100 A 100 100 0 0 1 0 100 A 50 50 0 0 0 0 0 A 50 50 0 0 1 0 -100 Z" fill="#F3F4F6" />
    
    <!-- Inner Yin Dot -->
    <circle cx="0" cy="-50" r="16" fill="#111827" />
    
    <!-- Inner Yang Dot -->
    <circle cx="0" cy="50" r="16" fill="#F3F4F6" />

    <!-- Thin elegant border to look good on both Light & Dark mode browser tabs -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#4B5563" stroke-width="4" />
  </g>
</svg>